<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry JS - Platformer Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div id="mainMenu">
            <h1>GEOMETRY JS</h1>
            <div id="playerPreview"></div>
            <p>Usa le <b>FRECCE</b> per cambiare colore</p>
            <p>Premi <b>SPAZIO</b> per iniziare</p>
            <div class="controls-hint">Salto: SPAZIO / FRECCIA SU</div>
        </div>

        <div id="score">Score: 0</div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
