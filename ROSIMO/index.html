<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake OOP - Phaser 3</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #a0e0ff; /* Cielo azzurro */
            overflow: hidden;
            position: relative;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenitore centrale per il gioco */
        #game-container {
            position: relative;
            z-index: 10;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.5);
            border-radius: 8px;
            border: 4px solid #4a2f15;
        }

        /* --- ANIMAZIONE DELLE NUVOLE DELLO SFONDO --- */
        .nuvola-esterna {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.85;
            z-index: 1; 
            animation: volaDestra linear infinite;
        }
        .nuvola-esterna::before, .nuvola-esterna::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .n1 { width: 140px; height: 45px; top: 8%; animation-duration: 22s; }
        .n1::before { width: 60px; height: 60px; top: -25px; left: 15px; }
        .n1::after { width: 80px; height: 80px; top: -40px; right: 20px; }

        .n2 { width: 180px; height: 55px; bottom: 8%; animation-duration: 32s; }
        .n2::before { width: 75px; height: 75px; top: -35px; left: 20px; }
        .n2::after { width: 100px; height: 100px; top: -50px; right: 25px; }

        .n3 { width: 120px; height: 40px; top: 35%; animation-duration: 18s; opacity: 0.75; }
        .n3::before { width: 50px; height: 50px; top: -20px; left: 12px; }
        .n3::after { width: 70px; height: 70px; top: -35px; right: 15px; }

        .n4 { width: 160px; height: 50px; top: 60%; animation-duration: 27s; opacity: 0.8; }
        .n4::before { width: 65px; height: 65px; top: -30px; left: 18px; }
        .n4::after { width: 90px; height: 90px; top: -45px; right: 22px; }

        @keyframes volaDestra {
            0% { left: -250px; }
            100% { left: 105vw; }
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <script src="BaseLevel.js" defer></script>
    <script src="level1.js" defer></script>
    <script src="level2.js" defer></script>
    <script src="level3.js" defer></script>
    <script src="level4.js" defer></script>
    <script src="level5.js" defer></script> 
    <script src="main.js" defer></script>
</head>
<body>

    <div class="nuvola-esterna n1"></div>
    <div class="nuvola-esterna n2"></div>
    <div class="nuvola-esterna n3"></div>
    <div class="nuvola-esterna n4"></div>

    <div id="game-container"></div>

</body>
</html>
